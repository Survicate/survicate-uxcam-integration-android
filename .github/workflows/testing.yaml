name: Testing

on: [push, workflow_call]

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Unit tests
        run: ./gradlew :lib:testDebugUnitTest
      - name: Lint
        run: ./gradlew :lib:lintDebug

  connected:
    name: Emulator smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run instrumented tests
        # Pin to a full commit SHA (supply-chain hardening, see ITS-61)
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          script: |
            adb logcat > emulator.log &
            ./gradlew :example:connectedDebugAndroidTest --stacktrace
      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: connected-test-results
          path: |
            emulator.log
            example/build/reports/androidTests/connected/**
            example/build/outputs/androidTest-results/**
